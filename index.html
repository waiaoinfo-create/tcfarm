<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>頭城農場 | 高鐵延伸宜蘭產業影響分析</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f4f4f4; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .section-title { color: #333; margin-bottom: 15px; }
        .bar { margin-bottom: 15px; }
        .bar-bg { background: #eee; height: 20px; border-radius: 10px; }
        .bar-fill { background: #4CAF50; height: 20px; border-radius: 10px; }
        .swot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .swot-card { padding: 15px; border-radius: 8px; color: white; }
        .s { background: #2ecc71; } .w { background: #e67e22; }
        .o { background: #3498db; } .t { background: #e74c3c; }
    </style>
</head>
<body>

<section class="section">
    <h2 class="section-title">經營績效數據</h2>
    <div class="bar">
        <div class="bar-title">餐飲收入 +2.9%</div>
        <div class="bar-bg">
            <div class="bar-fill" style="width:8%"></div>
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">SWOT 分析</h2>
    <div class="swot-grid">
        <div class="swot-card s">
            <h3>S 優勢</h3>
            <p>47年品牌、GSTC認證、120公頃完整生態場域。</p>
        </div>
        <div class="swot-card w">
            <h3>W 劣勢</h3>
            <p>交通不便、國際客比例低、人力招募困難。</p>
        </div>
        <div class="swot-card o">
            <h3>O 機會</h3>
            <p>ESG市場成長、國際旅遊、高鐵低碳運輸。</p>
        </div>
        <div class="swot-card t">
            <h3>T 威脅</h3>
            <p>快閃化、一日生活圈、溪北邊緣化風險。</p>
        </div>
    </div>
</section>

<footer>
    <h2>頭城農場 × 高鐵延伸宜蘭分析報告</h2>
    <p>本網站整合高鐵延伸宜蘭計畫、日本新幹線案例、永續觀光與 ESG 發展分析。</p>
</footer>

</body>
</html>
